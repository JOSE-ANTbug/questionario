<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesquisa SENAC</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

/* HEADER */
.header {
  background: white;
  border-bottom: 4px solid #f37021;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo {
  width: 60px;
}

.title {
  display: flex;
  flex-direction: column;
}

.title h1 {
  margin: 0;
  color: #004a8f;
  font-size: 20px;
}

.title span {
  color: #f37021;
  font-weight: bold;
  font-size: 14px;
}

/* CONTAINER */
.container {
  max-width: 750px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
}

/* BLOCO */
h2 {
  color: #004a8f;
  border-left: 5px solid #f37021;
  padding-left: 10px;
}

/* QUESTÕES */
.question {
  margin: 20px 0;
}

label {
  display: block;
  margin: 5px 0;
  cursor: pointer;
}

/* SLIDER */
.slider-value {
  font-weight: bold;
  color: #004a8f;
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 80px;
  margin-top: 8px;
  padding: 8px;
}

/* BOTÃO */
button {
  margin-top: 20px;
  background: #f37021;
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <!-- COLOQUE O LOGO AQUI -->
  <img src="logo-senac.png" class="logo">

  <div class="title">
    <h1>Projeto Jovem Aprendiz</h1>
    <span>Turma 0131</span>
  </div>
</div>

<div class="container">

<h2>Perfil do Vendedor</h2>

<div class="question">
  <p>1. Há quanto tempo você trabalha neste comércio?</p>
  <label><input type="radio" name="q1"> Menos de 6 meses</label>
  <label><input type="radio" name="q1"> 6 a 12 meses</label>
  <label><input type="radio" name="q1"> 1 a 3 anos</label>
  <label><input type="radio" name="q1"> Mais de 3 anos</label>
</div>

<div class="question">
  <p>2. Qual é o seu principal papel?</p>
  <label><input type="radio" name="q2"> Vendas diretas</label>
  <label><input type="radio" name="q2"> Atendimento</label>
  <label><input type="radio" name="q2"> Estoque</label>
  <label><input type="radio" name="q2"> Gestão</label>
</div>

<h2>Dificuldades</h2>

<div class="question">
  <p>6. O que mais dificulta fechar uma venda?</p>
  <label><input type="checkbox"> Preço alto</label>
  <label><input type="checkbox"> Falta de produto</label>
  <label><input type="checkbox"> Cliente indeciso</label>
  <label><input type="checkbox"> Concorrência</label>
</div>

<div class="question">
  <p>7. Existe um processo claro?</p>
  <input type="range" min="1" max="5" value="3" oninput="updateValue(this)">
  <div class="slider-value">Valor: <span id="valor">3</span></div>
</div>

<div class="question">
  <p>22. Se pudesse mudar algo:</p>
  <textarea placeholder="Digite aqui..."></textarea>
</div>

<button>Enviar</button>

</div>

<script>
function updateValue(slider) {
  document.getElementById("valor").innerText = slider.value;
}
</script>

</body>
</html>
